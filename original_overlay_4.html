<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Original Survival — Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: transparent;
    color: #fff;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  .overlay {
    display: inline-flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(25, 8, 35, 0.85);
    border: 2px solid #c084fc;
    border-radius: 18px;
    padding: 12px 18px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 28px rgba(192, 132, 252, 0.4);
    position: relative;
  }

  /* === Compteur en flottant top-right === */
  .live-counter {
    position: absolute;
    top: -10px;
    right: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #d946ef, #a855f7);
    border-radius: 20px;
    padding: 3px 10px 3px 8px;
    box-shadow: 0 0 12px rgba(217, 70, 239, 0.6);
    border: 1.5px solid rgba(255,255,255,0.2);
  }

  .live-counter .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px #fff;
    animation: pulse 1.5s infinite;
  }
  .live-counter .dot.offline {
    background: #6b7280;
    box-shadow: none;
    animation: none;
  }
  .live-counter .dot.loading {
    background: #fbbf24;
    box-shadow: 0 0 6px #fbbf24;
  }

  .live-counter .count {
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .live-counter .max {
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    font-weight: 600;
  }

  .live-counter .label {
    font-size: 9px;
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    letter-spacing: 1px;
    margin-left: 2px;
    border-left: 1px solid rgba(255,255,255,0.3);
    padding-left: 6px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  /* === Lignes IP === */
  .ip-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 10px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.6px;
    min-width: 95px;
    text-align: center;
  }

  .badge.java {
    background: #d946ef;
    color: #fff;
    box-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
  }

  .badge.bedrock {
    background: #f0abfc;
    color: #4a044e;
    box-shadow: 0 0 10px rgba(240, 171, 252, 0.4);
  }

  .badge.port {
    background: transparent;
    color: #f0abfc;
    border: 1px solid #f0abfc;
    min-width: 95px;
    padding: 1px 8px;
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  .ip-text {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    font-family: 'Consolas', 'Monaco', monospace;
  }

  .bedrock-stack {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: center;
  }
</style>
</head>
<body>

<div class="overlay">

  <!-- Compteur flottant top-right -->
  <div class="live-counter">
    <span class="dot loading" id="javaDot"></span>
    <span class="count" id="javaCount">—</span>
    <span class="max" id="javaMax">/ ?</span>
    <span class="label">EN&nbsp;LIGNE</span>
  </div>

  <!-- Java / Crack -->
  <div class="ip-row">
    <span class="badge java">JAVA &amp; CRACK</span>
    <span class="ip-text">play.original-survival.fr</span>
  </div>

  <!-- Bedrock -->
  <div class="ip-row" style="align-items: flex-start;">
    <div class="bedrock-stack">
      <span class="badge bedrock">BEDROCK</span>
      <span class="badge port">PORT 42452</span>
    </div>
    <span class="ip-text" style="margin-top: 3px;">bedrock.original-survival.fr</span>
  </div>

</div>

<script>
  const REFRESH_MS = 10000;

  const APIS = [
    {
      url: 'https://api.mcsrvstat.us/3/play.original-survival.fr',
      parse: (d) => ({ online: d.online === true, players: d.players?.online ?? 0, max: d.players?.max ?? '?' })
    },
    {
      url: 'https://api.mcstatus.io/v2/status/java/play.original-survival.fr',
      parse: (d) => ({ online: d.online === true, players: d.players?.online ?? 0, max: d.players?.max ?? '?' })
    }
  ];

  async function fetchPlayers() {
    const countEl = document.getElementById('javaCount');
    const maxEl = document.getElementById('javaMax');
    const dotEl = document.getElementById('javaDot');

    dotEl.className = 'dot loading';

    for (const api of APIS) {
      try {
        const res = await fetch(api.url, { cache: 'no-store' });
        if (!res.ok) throw new Error();
        const data = await res.json();
        const result = api.parse(data);
        if (result.online) {
          countEl.textContent = result.players;
          maxEl.textContent = `/ ${result.max}`;
          dotEl.className = 'dot';
          return;
        }
      } catch (e) { /* essaie le suivant */ }
    }

    countEl.textContent = '—';
    maxEl.textContent = '';
    dotEl.className = 'dot offline';
  }

  fetchPlayers();
  setInterval(fetchPlayers, REFRESH_MS);
</script>

</body>
</html>
