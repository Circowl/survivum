<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Survivum Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 30px;
    font-family: 'Rajdhani', sans-serif;
  }

  .widget {
    position: relative;
    display: flex;
    align-items: center;
    gap: 24px;
    background: linear-gradient(135deg, rgba(0,0,0,0.88) 0%, rgba(10,20,10,0.93) 100%);
    border: 2px solid rgba(80,220,100,0.40);
    border-radius: 20px;
    padding: 18px 36px 18px 22px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
    animation: fadeIn 0.6s ease;
  }

  .widget::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 20px 20px 0 0;
    background: linear-gradient(90deg, transparent, rgba(80,220,100,0.7), transparent);
  }

  /* Icône creeper */
  .icon-wrap {
    position: relative;
    width: 64px;
    height: 64px;
    flex-shrink: 0;
  }
  .icon-wrap svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 10px rgba(80,220,100,0.6));
  }
  .pulse-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(80,220,100,0.4);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 0.1; }
  }

  /* Compteur joueurs */
  .count-block {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-right: 24px;
    border-right: 2px solid rgba(80,220,100,0.2);
  }
  .count {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 24px rgba(80,220,100,0.9);
    min-width: 40px;
  }
  .max {
    font-size: 18px;
    color: rgba(255,255,255,0.3);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    align-self: flex-end;
    margin-bottom: 3px;
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4cdc64;
    box-shadow: 0 0 8px #4cdc64;
    animation: blink 2.5s ease-in-out infinite;
    align-self: flex-end;
    margin-bottom: 5px;
    flex-shrink: 0;
  }
  .status-dot.offline { background: #e05555 !important; box-shadow: 0 0 8px #e05555 !important; animation: none; }
  .status-dot.loading { background: #888 !important; box-shadow: none !important; animation: blink 0.8s ease-in-out infinite; }

  /* IPs */
  .ips {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ip-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ip-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .ip-badge.java    { background: rgba(80,220,100,0.15); color: #4cdc64; border: 1px solid rgba(80,220,100,0.4); }
  .ip-badge.bedrock { background: rgba(255,160,50,0.15);  color: #f0a030; border: 1px solid rgba(255,160,50,0.4); }
  .ip-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="widget">

  <div class="icon-wrap">
    <div class="pulse-ring"></div>
    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="0" width="14" height="14" fill="#4cdc64"/>
      <rect x="3" y="3" width="3" height="3" fill="#1a1a1a"/>
      <rect x="10" y="3" width="3" height="3" fill="#1a1a1a"/>
      <rect x="6" y="7" width="4" height="2" fill="#1a1a1a"/>
      <rect x="4" y="9" width="2" height="2" fill="#1a1a1a"/>
      <rect x="10" y="9" width="2" height="2" fill="#1a1a1a"/>
      <rect x="6" y="11" width="4" height="2" fill="#1a1a1a"/>
    </svg>
  </div>

  <div class="count-block">
    <span class="count" id="playerCount">...</span>
    <span class="max" id="playerMax"></span>
    <span class="status-dot loading" id="statusDot"></span>
  </div>

  <div class="ips">
    <div class="ip-row">
      <span class="ip-badge java">Java & Crack</span>
      <span class="ip-value">play.survivum.fr</span>
    </div>
    <div class="ip-row">
      <span class="ip-badge bedrock">Bedrock</span>
      <span class="ip-value">bedrock.survivum.fr : 42452</span>
    </div>
  </div>

</div>

<script>
  const REFRESH_MS = 10000;

  const APIS = [
    {
      url: 'https://api.mcsrvstat.us/3/play.survivum.fr',
      parse: (d) => ({ online: d.online === true, players: d.players?.online ?? 0, max: d.players?.max ?? '?' })
    },
    {
      url: 'https://api.mcstatus.io/v2/status/java/play.survivum.fr',
      parse: (d) => ({ online: d.online === true, players: d.players?.online ?? 0, max: d.players?.max ?? '?' })
    }
  ];

  async function fetchPlayers() {
    const countEl = document.getElementById('playerCount');
    const maxEl   = document.getElementById('playerMax');
    const dotEl   = document.getElementById('statusDot');

    dotEl.className = 'status-dot loading';

    for (const api of APIS) {
      try {
        const res = await fetch(api.url, { cache: 'no-store' });
        if (!res.ok) throw new Error();
        const data = await res.json();
        const result = api.parse(data);
        if (result.online) {
          countEl.textContent = result.players;
          maxEl.textContent   = `/ ${result.max}`;
          dotEl.className     = 'status-dot';
          return;
        }
      } catch (e) { /* essaie le suivant */ }
    }

    countEl.textContent = '—';
    maxEl.textContent   = '';
    dotEl.className     = 'status-dot offline';
  }

  fetchPlayers();
  setInterval(fetchPlayers, REFRESH_MS);
</script>
</body>
</html>
